# NGINX API Gateway Configuration
# Demonstrates various API Gateway features

# Define the user that will own and run the Nginx server
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/json;

    # Custom log format for API Gateway monitoring
    log_format api_gateway '$remote_addr - $remote_user [$time_local] '
                          '"$request" $status $body_bytes_sent '
                          '"$http_referer" "$http_user_agent" '
                          'rt=$request_time uct="$upstream_connect_time" '
                          'uht="$upstream_header_time" urt="$upstream_response_time" '
                          'api_key=$http_x_api_key';

    access_log /var/log/nginx/access.log api_gateway;

    # Enable compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types application/json text/plain;

    # Rate limiting zones
    # Zone 1: Limit by IP address - 10 requests per second
    limit_req_zone $binary_remote_addr zone=ip_limit:10m rate=10r/s;
    
    # Zone 2: Limit by API key - 100 requests per second per key
    limit_req_zone $http_x_api_key zone=api_key_limit:10m rate=100r/s;
    
    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=addr_conn_limit:10m;

    # Cache configuration
    proxy_cache_path /var/cache/nginx/api_cache 
                     levels=1:2 
                     keys_zone=api_cache:10m 
                     max_size=100m 
                     inactive=60m 
                     use_temp_path=off;

    # Upstream backend servers (for load balancing)
    upstream price_service_backend {
        # Load balancing method: least_conn (others: round_robin, ip_hash)
        least_conn;
        
        # Backend servers - we'll run multiple instances
        server host.docker.internal:8000 max_fails=3 fail_timeout=30s;
        server host.docker.internal:8001 max_fails=3 fail_timeout=30s backup;
        server host.docker.internal:8002 max_fails=3 fail_timeout=30s backup;
        
        # Health check parameters
        keepalive 32;
    }

    # Map for API key validation
    map $http_x_api_key $is_valid_api_key {
        default 0;
        "dev-key-12345" 1;
        "test-key-67890" 1;
        "prod-key-abcdef" 1;
    }

    # Server block
    server {
        listen 80;
        server_name localhost;

        # Maximum request body size
        client_max_body_size 1m;
        
        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;

        # Connection limiting - max 10 connections per IP
        limit_conn addr_conn_limit 10;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # CORS configuration
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, X-API-Key" always;

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Health check endpoint (no auth required)
        location = /healthz {
            access_log off;
            
            # Apply rate limiting
            limit_req zone=ip_limit burst=5 nodelay;
            
            proxy_pass http://price_service_backend/healthz;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Gateway status endpoint
        location = /gateway/status {
            access_log off;
            default_type application/json;
            return 200 '{"gateway":"nginx","status":"running","version":"1.0.0"}';
        }

        # Gateway metrics endpoint
        location = /gateway/metrics {
            stub_status;
            access_log off;
        }

        # API endpoints with full gateway features
        location /v1/ {
            # API Key validation
            if ($is_valid_api_key = 0) {
                return 401 '{"error":"Invalid or missing API key","message":"Please provide a valid X-API-Key header"}';
            }

            # Rate limiting with burst capacity
            limit_req zone=api_key_limit burst=20 nodelay;
            limit_req zone=ip_limit burst=5 nodelay;
            
            # Enable caching for GET requests
            proxy_cache api_cache;
            proxy_cache_methods GET;
            proxy_cache_valid 200 5m;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
            proxy_cache_background_update on;
            proxy_cache_lock on;
            
            # Cache key includes API key for per-user caching
            proxy_cache_key "$scheme$request_method$host$request_uri$http_x_api_key";
            
            # Add cache status header
            add_header X-Cache-Status $upstream_cache_status;
            add_header X-Response-Time $request_time;

            # Proxy to backend
            proxy_pass http://price_service_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-API-Key $http_x_api_key;
            
            # Buffering settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # Catch-all for undefined routes
        location / {
            default_type application/json;
            return 404 '{"error":"Not Found","message":"The requested endpoint does not exist"}';
        }
    }
}
